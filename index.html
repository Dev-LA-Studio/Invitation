<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe & Pau | Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glow: rgba(212, 175, 55, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #0a0a14 0%, #000 100%);
            overflow: hidden; font-family: 'Montserrat', sans-serif; perspective: 1500px;
        }

        /* Twinkling Stars Background */
        .stars { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle infinite linear; }
        @keyframes twinkle { 0% { transform: scale(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

        /* Sparkle Particle Styling */
        .sparkle {
            position: absolute; width: 4px; height: 4px; background: var(--gold);
            border-radius: 50%; pointer-events: none; z-index: 60;
            box-shadow: 0 0 10px var(--gold);
        }

        /* Envelope - Back to 400x260 */
        .envelope-wrapper {
            position: relative; width: 400px; height: 260px;
            background: #f9f6f0; cursor: pointer; z-index: 10; margin-top: 120px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 15px var(--glow);
            transition: transform 0.3s ease;
        }
        
        .envelope-wrapper:hover { transform: scale(1.02); }

        .envelope-front-body {
            position: absolute; bottom: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 30; border-radius: 0 0 5px 5px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Flap - Back to original proportions */
        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-top: 160px solid #ece9e2; border-left: 200px solid transparent;
            border-right: 200px solid transparent; transform-origin: top;
            z-index: 40; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Photos Bursting Out */
        .burst-pic {
            position: absolute; width: 150px; height: 190px;
            background-size: cover; background-position: center;
            border: 5px solid white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--glow);
            bottom: 20px; left: 50%; transform: translateX(-50%) scale(0.6);
            opacity: 0; z-index: 20;
            transition: all 2.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Glowing Wax Seal */
        .wax-seal {
            position: absolute; top: 150px; left: 50%; transform: translate(-50%, -50%);
            width: 65px; height: 65px; background: radial-gradient(circle, #d4af37, #aa8922);
            border-radius: 50%; z-index: 41; display: flex; justify-content: center;
            align-items: center; color: white; font-family: 'Cinzel'; font-weight: bold;
            box-shadow: 0 0 15px var(--gold); transition: 0.5s;
        }

        /* Open State Animations */
        .open .flap { transform: rotateX(180deg); z-index: 5; }
        .open .wax-seal { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        .open .pic-1 { transform: translate(-160%, -100%) rotate(-12deg) scale(1); opacity: 1; transition-delay: 0.6s; }
        .open .pic-2 { transform: translate(-50%, -120%) rotate(0deg) scale(1.05); opacity: 1; transition-delay: 1.1s; }
        .open .pic-3 { transform: translate(60%, -100%) rotate(12deg) scale(1); opacity: 1; transition-delay: 1.6s; }

        .names-front { font-family: 'Great Vibes', cursive; font-size: 38px; color: #333; }
        .date-front { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: var(--gold); }
        
        .hint { position: absolute; bottom: -60px; width: 100%; text-align: center; color: #fff; text-shadow: 0 0 10px var(--gold); font-size: 11px; letter-spacing: 2px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>
    
    <div class="envelope-wrapper" id="invitation" onclick="openInvite()">
        <div class="flap"></div>
        <div class="wax-seal">JP</div>
        
        <div class="burst-pic pic-1" style="background-image: url('image/pic1.jpg');"></div>
        <div class="burst-pic pic-2" style="background-image: url('image/pic2.jpg');"></div>
        <div class="burst-pic pic-3" style="background-image: url('image/pic3.jpg');"></div>
        
        <div class="envelope-front-body">
            <div class="names-front">Joe & Pau</div>
            <div class="date-front">May 28, 2026</div>
        </div>
        <div class="hint">✦ CLICK TO OPEN ✦</div>
    </div>

    <script>
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            document.body.appendChild(sparkle);

            const destinationX = x + (Math.random() - 0.5) * 300;
            const destinationY = y + (Math.random() - 0.5) * 300;

            sparkle.style.left = `${x}px`;
            sparkle.style.top = `${y}px`;

            const animation = sparkle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${destinationX - x}px, ${destinationY - y}px) scale(0)`, opacity: 0 }
            ], {
                duration: 1000 + Math.random() * 1000,
                easing: 'cubic-bezier(0, .9, .57, 1)'
            });

            animation.onfinish = () => sparkle.remove();
        }

        function openInvite() {
            const invite = document.getElementById('invitation');
            if(invite.classList.contains('open')) return;

            invite.classList.add('open');

            const rect = invite.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for(let i = 0; i < 50; i++) {
                setTimeout(() => createSparkle(centerX, centerY), i * 20);
            }

            setTimeout(() => {
                document.body.style.transition = "opacity 1.5s";
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = 'details.html'; }, 1500);
            }, 7000);
        }

        const starField = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.cssText = `width: ${Math.random()*3}px; height: ${Math.random()*3}px; left: ${Math.random()*100}%; top: ${Math.random()*100}%; animation-duration: ${Math.random()*3+1}s; animation-delay: ${Math.random()*2}s;`;
            starField.appendChild(star);
        }
    </script>
</body>
</html>
